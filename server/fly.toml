# fly.toml app configuration file generated for fronton-torneos-api on 2026-03-07T11:33:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fronton-torneos-api'
primary_region = 'gru'

[build]

[env]
  HOST = "0.0.0.0"
  PORT = "3001"
  CORS_ORIGIN = "https://fronton-torneos-web.fly.dev"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
